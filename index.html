<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLN College Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#003366,#0059b3);
        }

        .login-box{
            width:360px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.3);
            text-align:center;
        }

        .login-box img{
            width:110px;
            margin-bottom:15px;
        }

        .login-box h2{
            color:#003366;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:18px;
            text-align:left;
        }

        .input-group label{
            font-weight:bold;
            display:block;
            margin-bottom:6px;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        .input-group input:focus{
            border-color:#0059b3;
            outline:none;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#003366;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            background:#0059b3;
        }

        .forgot{
            margin-top:15px;
        }

        .forgot a{
            color:#0059b3;
            text-decoration:none;
            font-size:14px;
        }

        .forgot a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    <img src="logo.png" alt="KLN College Logo">

    <h2>KLN College Login</h2>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

    </form>

</div>

</body>
</html>
