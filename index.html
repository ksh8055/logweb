<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLN College Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #003366, #0059b3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 360px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .login-container img {
            width: 120px;
            margin-bottom: 15px;
        }

        .login-container h2 {
            color: #003366;
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        .input-box input:focus {
            outline: none;
            border-color: #0059b3;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0059b3;
        }

        .forgot {
            margin-top: 15px;
        }

        .forgot a {
            text-decoration: none;
            color: #0059b3;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <img src="Screenshot 2026-07-13 111836.png" alt="KLN College Logo">

        <h2>KLN College Login</h2>

        <form>

            <div class="input-box">
                <label>Username</label>
                <input type="text" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button type="submit">Login</button>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>

        </form>

    </div>

</body>
</html>
